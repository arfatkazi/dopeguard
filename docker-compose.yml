services:
  mongo:
    image: mongodb
    container_name: mongodb
    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongo-data:/data/db/

    networks:
      - dopeguard- net

  backend:
    build: ./backend
    container_name: dopeguard-backend
    ports:
      - "8080:8080"

    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://root:password@mongo:27017/dopeguard

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - dopeguard-net

  frontend:
    build: ./frontend
    container_name: dopeguard-frontend
    ports:
      - "3000:3000"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - dopeguard-net

volumes:
  mongo-data:

networks:
  dopeguard-net:
    driver: bridge
