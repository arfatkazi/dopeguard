name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint --if-present
        continue-on-error: true

      - name: Test frontend
        run: npm test --if-present

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongo:
        image: mongo:7
        ports:
          - "27017:27017"

        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password

        options: >-
          --health-cmd="mongosh --quiet -u root -p password --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --if-present 
        continue-on-error: true

      - name: Run backend tests
        run: npm test --if-present

      - name: Create backend env file
        run: |
          cat > .env << EOF
          PORT=5000
          NODE_ENV=test
          MONGO_URI=mongodb://root:password@localhost:27017/DopeGuard?authSource=admin
          JWT_SECRET=testsecret123
          CLIENT_URL=http://localhost:3000
          EOF

      - name: Start backend
        run: |
          npm start > backend.log 2>&1 &
          sleep 20

      - name: Check backend health
        run: |
          curl -f  http://127.0.0.1:5000/ || exit 1

      - name: Show backend logs
        if: failure()
        run: cat backend.log

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t dopeguard-backend:test ./backend

      - name: Build frontend image
        run: docker build -t dopeguard-frontend:test ./frontend
