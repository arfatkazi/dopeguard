<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>DopeGuard Login</title>

    <style>
      :root {
        --bg: #0b0d12;
        --card: #111821;
        --text: #e4f5ff;
        --text-muted: #a8b7c8;
        --accent: #2cf9a3;
        --danger: #ff4d4d;
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: "Inter", sans-serif;
        width: 300px;
        color: var(--text);
        text-align: center;
      }

      .container {
        padding: 22px;
      }

      h2 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 1.4rem;
        font-weight: 700;
      }

      #dg-status {
        margin-bottom: 14px;
        font-size: 0.95rem;
        color: var(--accent);
      }

      #inactive-banner {
        display: none;
        background: var(--danger);
        padding: 8px;
        color: white;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 0.9rem;
        font-weight: 500;
      }

      form {
        margin-top: 12px;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 12px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: var(--card);
        color: var(--text);
        font-size: 0.9rem;
        outline: none;
        box-sizing: border-box;
      }

      /* Password wrapper */
      .password-wrapper {
        position: relative;
        width: 100%;
      }

      .password-wrapper input {
        padding-right: 42px;
      }

      /* Eye toggle button */
      .toggle-eye {
        position: absolute;
        right: 10px;
        top: 45%;
        transform: translateY(-50%);
        width: 24px;
        height: 24px;
        cursor: pointer;
        fill: var(--accent);
        opacity: 0.85;
        transition: opacity 0.2s;
      }

      .toggle-eye:hover {
        opacity: 1;
      }

      button {
        width: 100%;
        padding: 10px;
        background: var(--accent);
        color: #0b0d12;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.95rem;
        margin-top: 6px;
        transition: background 0.2s;
      }

      button:hover {
        background: #22d98e;
      }

      #dg-logout {
        margin-top: 14px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>DopeGuard Shield</h2>

      <div id="inactive-banner"></div>

      <p id="dg-status" style="font-weight: 600; color: #2cf9a3">Checking...</p>

      <form id="dg-login-form" autocomplete="off">
        <input
          id="dg-email"
          type="email"
          placeholder="Email"
          autocomplete="username"
        />

        <div class="password-wrapper">
          <input
            id="dg-password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
          />

          <svg class="toggle-eye" id="toggle-pass" viewBox="0 0 24 24">
            <path
              id="eye-path"
              d="M12 5c-7.63 0-11 7-11 7s3.37 7 11 7 11-7 11-7-3.37-7-11-7zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 
                 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.35-3 3s1.34 3 3 3 
                 3-1.35 3-3-1.34-3-3-3z"
            />
          </svg>
        </div>

        <button type="submit" id="dg-login-btn">Login</button>
      </form>

      <button id="dg-logout">Logout</button>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
